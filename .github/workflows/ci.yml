name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      typescript_client: ${{ steps.filter.outputs.typescript_client }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            typescript_client:
              - 'clients/typescript/**'
              - 'api/proto/membrane/v1/membrane.proto'
              - '.github/workflows/ci.yml'
              - '.github/workflows/npm-publish.yml'

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Run tests with coverage
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

      - name: Install and run staticcheck
        if: matrix.go-version == '1.23'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  typescript-client:
    needs: detect-changes
    if: needs.detect-changes.outputs.typescript_client == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install TypeScript client dependencies
        run: npm ci
        working-directory: clients/typescript

      - name: Verify proto sync
        run: npm run check:proto-sync
        working-directory: clients/typescript

      - name: Typecheck TypeScript client
        run: npm run typecheck
        working-directory: clients/typescript

      - name: Test TypeScript client
        run: npm test
        working-directory: clients/typescript
