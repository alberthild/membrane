# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

reviews:
  profile: "assertive"
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "wip"
      - "draft"
    auto_pause_after_reviewed_commits: 0
  path_filters:
    - "!go.sum"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
    - "!**/*.snap"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.vitepress/dist/**"
    - "!**/coverage/**"
    - "!**/.next/**"
    - "!**/site/**"
    - "!**/docs/.vitepress/cache/**"
    - "!**/*.min.js"
    - "!**/*.generated.*"
    - "!**/*pb.go"

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "CONTRIBUTING.md"
      - "README.md"
      - "docs/**/*.md"
